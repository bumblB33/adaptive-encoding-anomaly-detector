# Ordinal feature annotations for IEEE-CIS Fraud Detection.
#
# Map each feature name to its explicit value sequence (low to high).
# Features listed here receive interpretability rubric score 0.70
# (ordering confirmed and human-verified). Features NOT listed default
# to 0.30 — unconfirmed ordering is treated as a liability, because
# ordinal encoding on the wrong axis silently injects spurious structure
# that downstream models pick up on.
#
# The current entries are the only IEEE-CIS categoricals whose value
# strings literally encode an ordering. Defense for each is in
# notebooks/01_eda.ipynb ("Ordinal candidate investigation"). Close
# calls that we deliberately exclude (id_23 proxy types, id_15
# Found/New/Unknown) fall back to the 0.30 unlisted score by design.

id_34:
  - "match_status:-1"
  - "match_status:0"
  - "match_status:1"
  - "match_status:2"

M4:
  - M0
  - M1
  - M2
